<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F1E3D"/>
      <stop offset="100%" stop-color="#050A14"/>
    </radialGradient>
    <radialGradient id="blueLens" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
    <radialGradient id="orangeLens" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="128" cy="128" r="126" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="126" fill="none" stroke="#2563EB" stroke-width="6"/>
  <!-- Subtle crosshair -->
  <line x1="6" y1="128" x2="250" y2="128" stroke="#4080CC" stroke-width="1.2" opacity="0.5"/>
  <line x1="128" y1="6" x2="128" y2="250" stroke="#4080CC" stroke-width="1.2" opacity="0.5"/>
  <!-- RGB Camera lens (blue, left) -->
  <circle cx="99" cy="128" r="40" fill="#061430" stroke="#2563EB" stroke-width="5"/>
  <circle cx="99" cy="128" r="24" fill="url(#blueLens)"/>
  <circle cx="99" cy="128" r="11" fill="#DBEAFE" opacity="0.9"/>
  <circle cx="92" cy="121" r="4" fill="white" opacity="0.6"/>
  <!-- Thermal Camera lens (orange, right) -->
  <circle cx="157" cy="128" r="40" fill="#1A0800" stroke="#F97316" stroke-width="5"/>
  <circle cx="157" cy="128" r="24" fill="url(#orangeLens)"/>
  <circle cx="157" cy="128" r="11" fill="#FEF3C7" opacity="0.9"/>
  <circle cx="150" cy="121" r="4" fill="white" opacity="0.6"/>
  <!-- Corner brackets (bounding box style) -->
  <polyline points="66,66 66,90 90,90" fill="none" stroke="#F97316" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="190,66 190,90 166,90" fill="none" stroke="#F97316" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="66,190 66,166 90,166" fill="none" stroke="#F97316" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="190,190 190,166 166,166" fill="none" stroke="#F97316" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI label dots at top -->
  <circle cx="112" cy="52" r="4" fill="#2563EB" opacity="0.8"/>
  <circle cx="128" cy="48" r="5" fill="#3B82F6"/>
  <circle cx="144" cy="52" r="4" fill="#2563EB" opacity="0.8"/>
</svg>
